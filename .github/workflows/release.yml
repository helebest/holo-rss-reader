name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify on Python 3.11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Validate repository
        run: uv run holo-rss-validate

      - name: Validate plugin sync
        run: uv run holo-rss-sync-plugin --check

      - name: Run tests
        run: uv run pytest

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is required." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        shell: bash
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          git fetch --tags --force
          git rev-parse "$TAG" >/dev/null
          git checkout --detach "$TAG"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build skill and plugin artifacts
        run: uv run holo-rss-build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/skills/*.zip
            dist/plugins/*.zip
            dist/checksums.txt
